version: "2"

linters:
  default: none
  enable:
    - gocritic      # style and correctness suggestions
    - misspell      # catch common English spelling mistakes in comments/strings
    - gosec         # security-oriented checks (great fit for a security monitor)
    - nilerr        # return nil instead of the actual error

  settings:
    gosec:
      excludes:
        # G304: file path from config (root-owned). Acceptable.
        - G304
        # G107: HTTP URL built from config values (Telegram API token), not user input.
        - G107
        # G115: integer overflow — fd casts (always fit int32) and disk stat conversions
        # (always positive). Safe in this codebase.
        - G115
        # G204: subprocess launched with variable — iptables and user-configured commands,
        # intentional by design in a firewall/setup watcher.
        - G204
        # G104: errors unhandled — defer inotify/fd cleanup; error is non-actionable.
        - G104
        # G103: unsafe calls — direct Linux syscalls in inotify/netlink watchers; expected.
        - G103
        # G703: path traversal via taint — config file paths written by setup wizard;
        # paths come from program constants, not user input.
        - G703
        # G704: SSRF via taint — HTTP calls to user-configured webhook/ntfy/Telegram URLs;
        # equivalent to G107 but for gosec v2 taint analysis.
        - G704
        # G706: log injection via taint — ClamAV/rkhunter output written to structured
        # log; this is the intended behaviour of the security tools watcher.
        - G706

  exclusions:
    rules:
      # Test files: relax some rules that are noisy in tests
      - path: "_test\\.go"
        linters:
          - gosec
          - errcheck
